name: Restack downstream PRs

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  restack:
    # Only run when a task branch PR merges
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.head.ref, '-task/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase downstream PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGED_BRANCH: ${{ github.event.pull_request.head.ref }}
          REBASE_ONTO: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          DOWNSTREAM=$(gh pr list \
            --state open \
            --base "$MERGED_BRANCH" \
            --json number,headRefName \
            --jq '.[] | "\(.number) \(.headRefName)"')

          if [ -z "$DOWNSTREAM" ]; then
            echo "No open PRs targeting $MERGED_BRANCH — nothing to do."
            exit 0
          fi

          while IFS=' ' read -r PR_NUMBER HEAD_BRANCH; do
            echo "Processing PR #$PR_NUMBER (branch: $HEAD_BRANCH)..."

            if ! git fetch origin "$HEAD_BRANCH" 2>/dev/null; then
              echo "Branch $HEAD_BRANCH not found remotely — skipping."
              continue
            fi

            git checkout -B "$HEAD_BRANCH" "origin/$HEAD_BRANCH"

            if ! git rebase --update-refs "origin/$REBASE_ONTO"; then
              git rebase --abort 2>/dev/null || true
              gh pr comment "$PR_NUMBER" --body \
                "⚠️ **Automatic rebase failed** — conflicts detected while rebasing \`$HEAD_BRANCH\` onto \`$REBASE_ONTO\` after \`$MERGED_BRANCH\` merged. Resolve manually: \`git fetch origin && git checkout $HEAD_BRANCH && git rebase origin/$REBASE_ONTO && git push --force-with-lease\`."
              continue
            fi

            if ! git push --force-with-lease origin "$HEAD_BRANCH"; then
              echo "Push failed for PR #$PR_NUMBER — branch may have been updated concurrently."
              continue
            fi

            gh pr comment "$PR_NUMBER" --body \
              "♻️ Branch \`$HEAD_BRANCH\` was automatically rebased onto \`$REBASE_ONTO\` after \`$MERGED_BRANCH\` merged."

            echo "PR #$PR_NUMBER rebased and pushed."
          done <<< "$DOWNSTREAM"
